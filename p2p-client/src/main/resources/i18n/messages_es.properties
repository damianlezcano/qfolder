help.text=qfolder<br><br>Desarrollado por Damian Lezcano.<br>GitHub: https://github.com/anomalyco/qfolder<br><br>qfolder permite crear o unirse a un espacio de trabajo para compartir archivos, chat, notas y pizarra entre usuarios.<br><br>Uso b\u00e1sico:<br>- Cree un espacio de trabajo o ingrese con el ID compartido.<br>- Use Archivos para ver y descargar documentos de otros usuarios.<br>- Use Chat para conversar y adjuntar archivos.<br>- Use Notas y Pizarra para trabajar informaci\u00f3n compartida.<br>- Al cerrar o desconectarse, la sesi\u00f3n se guarda en history.<br><br>Ubicaci\u00f3n de archivos:<br>- Archivos compartidos: {0}<br>- Historial de sesiones: {1}<br>- Archivos temporales: {2}
