help.text=qfolder<br><br>Developed by Damian Lezcano.<br>GitHub: https://github.com/anomalyco/qfolder<br><br>qfolder allows creating or joining a workspace to share files, chat, notes and whiteboard among users.<br><br>Basic usage:<br>- Create a workspace or join with a shared ID.<br>- Use Files to view and download documents from other users.<br>- Use Chat to talk and attach files.<br>- Use Notes and Whiteboard to work on shared information.<br>- When closing or disconnecting, the session is saved in history.<br><br>File locations:<br>- Shared files: {0}<br>- Session history: {1}<br>- Temporal files: {2}
